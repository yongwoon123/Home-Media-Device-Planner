<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Media Device Visualizer</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 1200px; margin: 40px auto; padding: 0 20px; color: #222; }
    h1 { margin-bottom: 4px; }
    .subtitle { color: #888; margin-bottom: 24px; font-size: 0.9rem; }
    h2 { margin-top: 36px; margin-bottom: 10px; font-size: 1rem; color: #444; text-transform: uppercase; letter-spacing: 0.05em; }

    /* Import */
    textarea { width: 100%; min-height: 100px; padding: 8px; border: 1px solid #ccc; border-radius: 4px;
               font-family: monospace; font-size: 0.8rem; resize: vertical; box-sizing: border-box; }
    .import-actions { display: flex; gap: 8px; margin-top: 8px; }
    button { padding: 7px 16px; border: 1px solid #ccc; border-radius: 4px; cursor: pointer;
             background: #fff; font-size: 0.9rem; }
    button:hover { background: #f5f5f5; }
    button.primary { background: #1565c0; color: #fff; border-color: #1565c0; }
    button.primary:hover { background: #0d47a1; }

    /* Stats */
    .stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 4px; }
    .stat-card { background: #f5f5f5; border: 1px solid #ddd; border-radius: 6px; padding: 10px 18px; text-align: center; min-width: 80px; }
    .stat-card .num { font-size: 1.6rem; font-weight: bold; color: #1565c0; line-height: 1.2; }
    .stat-card .label { font-size: 0.75rem; color: #666; margin-top: 2px; }
    .stat-card.errors .num { color: #c62828; }
    .stat-card.warnings .num { color: #e65100; }

    /* Diagram */
    #diagram-container { border: 2px solid #ccc; border-radius: 6px; background: #fafafa;
                         overflow-x: auto; padding: 0; }

    /* Path checker */
    .path-checker { background: #f5f5f5; border: 1px solid #ddd; border-radius: 6px; padding: 16px 20px; }
    .path-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .path-row select { padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; min-width: 160px; }
    .path-row .arrow { font-size: 1.2rem; color: #666; }
    .path-result { margin-top: 12px; padding: 10px 14px; border-radius: 4px; font-size: 0.9rem; line-height: 1.6; }
    .path-result.ok   { background: #e8f5e9; border: 1px solid #a5d6a7; color: #1b5e20; }
    .path-result.warn { background: #fff3e0; border: 1px solid #ffcc80; color: #bf360c; }
    .path-result.error { background: #ffebee; border: 1px solid #ef9a9a; color: #b71c1c; }
    .path-result.none { background: #fafafa; border: 1px solid #ddd; color: #666; }

    /* Connections table */
    table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
    th { background: #f0f0f0; text-align: left; padding: 8px 10px; font-size: 0.85rem; border: 1px solid #ddd; }
    td { padding: 6px 10px; border: 1px solid #e0e0e0; vertical-align: middle; font-size: 0.9rem; }
    .s-ok   { color: #2e7d32; font-weight: bold; }
    .s-warn { color: #e65100; font-weight: bold; }
    .s-err  { color: #c62828; font-weight: bold; }
    .s-inc  { color: #999; }
    .note   { color: #888; font-style: italic; font-size: 0.82rem; }

    .placeholder { color: #aaa; font-style: italic; text-align: center; padding: 48px 20px; }
    .hidden { display: none; }
    .btn-back { background: #f3e5f5; border-color: #ce93d8; color: #6a1b9a; margin-bottom: 16px; display: inline-block; }
    .btn-back:hover { background: #e1bee7; }
  </style>
</head>
<body>
<button class="btn-back" onclick="location.href='index.html'">← Back to Planner</button>
<h1>Media Device Visualizer</h1>
<p class="subtitle">Paste or upload a plan exported from the Media Device Planner, or navigate here from the Planner to auto-load your current setup.</p>

<!-- Import -->
<textarea id="json-input" placeholder="Paste exported JSON here…"></textarea>
<div class="import-actions">
  <button class="primary" onclick="loadJson()">Load</button>
  <button onclick="document.getElementById('file-input').click()">Upload JSON file</button>
  <input type="file" id="file-input" accept=".json" style="display:none" onchange="loadFile(event)">
  <button onclick="loadExample()">Load example</button>
</div>

<!-- Stats -->
<div id="stats-section" class="hidden">
  <h2>Overview</h2>
  <div class="stats" id="stats-cards"></div>
</div>

<!-- Diagram -->
<div id="diagram-section" class="hidden">
  <h2>Diagram</h2>
  <div id="diagram-container">
    <div class="placeholder">Load a plan to see the diagram.</div>
  </div>
</div>

<!-- Path checker -->
<div id="path-section" class="hidden">
  <h2>Path Checker</h2>
  <div class="path-checker">
    <div class="path-row">
      <span>From</span>
      <select id="path-from"></select>
      <span class="arrow">→</span>
      <select id="path-to"></select>
      <button class="primary" onclick="checkPath()">Check connection</button>
    </div>
    <div id="path-result" class="hidden"></div>
  </div>
</div>

<!-- Connections table -->
<div id="conn-section" class="hidden">
  <h2>All Connections</h2>
  <table>
    <thead>
      <tr>
        <th style="width:40px"></th>
        <th>From Device</th>
        <th>Port</th>
        <th style="width:24px"></th>
        <th>To Device</th>
        <th>Port</th>
        <th>Notes</th>
      </tr>
    </thead>
    <tbody id="conn-body"></tbody>
  </table>
</div>

<script>
  let plan = null;

  // ── Helpers ──────────────────────────────────────────────────
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function hexToRgb(hex) {
    return {
      r: parseInt(hex.slice(1,3),16),
      g: parseInt(hex.slice(3,5),16),
      b: parseInt(hex.slice(5,7),16)
    };
  }
  function devLabel(dev) {
    return (dev.name || '').trim() || `Device ${dev.id}`;
  }
  function devById(id) { return plan.devices.find(d => d.id === id); }
  function areaById(id) { return plan.areas.find(a => a.id === id); }
  function areaOf(dev) { return dev && dev.areaId != null ? areaById(dev.areaId) : null; }

  // ── Import ───────────────────────────────────────────────────
  function loadFile(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('json-input').value = e.target.result;
      loadJson();
    };
    reader.readAsText(file);
    event.target.value = '';
  }

  function loadJson() {
    const text = document.getElementById('json-input').value.trim();
    if (!text) return;
    let parsed;
    try { parsed = JSON.parse(text); }
    catch { alert('Invalid JSON — could not parse.'); return; }
    if (!Array.isArray(parsed.devices) || !Array.isArray(parsed.connections)) {
      alert('Invalid plan file — missing devices or connections.');
      return;
    }
    parsed.areas = Array.isArray(parsed.areas) ? parsed.areas : [];
    parsed.devices.forEach(d => { if (d.areaId == null) d.areaId = null; });
    plan = parsed;
    render();
  }

  function loadExample() {
    plan = {
      deviceCounter: 6, connectionCounter: 5, areaCounter: 2,
      areas: [
        { id: 1, name: 'Gaming Desk', color: '#1e88e5' },
        { id: 2, name: 'Office Desk', color: '#43a047' }
      ],
      devices: [
        { id: 1, name: 'PS5',           type: 'Console',        hdmiIn: 0, hdmiOut: 2, dpIn: 0, dpOut: 0, areaId: 1 },
        { id: 2, name: 'Gaming Monitor',type: 'Monitor',        hdmiIn: 2, hdmiOut: 0, dpIn: 1, dpOut: 0, areaId: 1 },
        { id: 3, name: 'KVM',           type: 'KVM Switch',     hdmiIn: 2, hdmiOut: 1, dpIn: 0, dpOut: 0, areaId: 1 },
        { id: 4, name: 'Work PC',       type: 'Desktop',        hdmiIn: 0, hdmiOut: 0, dpIn: 0, dpOut: 2, areaId: 2 },
        { id: 5, name: 'Office Monitor',type: 'Monitor',        hdmiIn: 1, hdmiOut: 0, dpIn: 2, dpOut: 0, areaId: 2 },
        { id: 6, name: 'Laptop',        type: 'Laptop',         hdmiIn: 0, hdmiOut: 1, dpIn: 0, dpOut: 1, areaId: null }
      ],
      connections: [
        { id: 1, fromDeviceId: 1, fromPortType: 'HDMI', fromPortNum: 1, toDeviceId: 2, toPortType: 'HDMI', toPortNum: 1 },
        { id: 2, fromDeviceId: 1, fromPortType: 'HDMI', fromPortNum: 2, toDeviceId: 3, toPortType: 'HDMI', toPortNum: 1 },
        { id: 3, fromDeviceId: 3, fromPortType: 'HDMI', fromPortNum: 1, toDeviceId: 5, toPortType: 'HDMI', toPortNum: 1 },
        { id: 4, fromDeviceId: 4, fromPortType: 'DP',   fromPortNum: 1, toDeviceId: 5, toPortType: 'DP',   toPortNum: 1 },
        { id: 5, fromDeviceId: 6, fromPortType: 'HDMI', fromPortNum: 1, toDeviceId: 2, toPortType: 'DP',   toPortNum: 1 }
      ]
    };
    document.getElementById('json-input').value = JSON.stringify(plan, null, 2);
    render();
  }

  // ── Validation ───────────────────────────────────────────────
  function validateConn(conn) {
    if (conn.fromDeviceId == null || conn.toDeviceId == null) {
      return { status: 'incomplete', notes: ['Incomplete — missing device on one or both ends'] };
    }
    if (conn.fromDeviceId === conn.toDeviceId) {
      return { status: 'error', notes: ['Self-loop'] };
    }
    const from = devById(conn.fromDeviceId);
    const to   = devById(conn.toDeviceId);
    if (!from || !to) return { status: 'error', notes: ['Device not found'] };

    const notes = [];
    let status = 'ok';

    if (conn.fromPortType !== conn.toPortType) {
      notes.push(`Adapter required: ${conn.fromPortType} ↔ ${conn.toPortType}`);
      status = 'warn';
    }

    const srcCap = conn.fromPortType === 'HDMI' ? from.hdmiOut : from.dpOut;
    if (srcCap === 0) {
      notes.push(`${devLabel(from)} has no ${conn.fromPortType} Out`);
      status = 'error';
    } else if (conn.fromPortNum > srcCap) {
      notes.push(`${devLabel(from)}: port ${conn.fromPortNum} exceeds ${conn.fromPortType} Out capacity (${srcCap})`);
      status = 'error';
    }

    const dstCap = conn.toPortType === 'HDMI' ? to.hdmiIn : to.dpIn;
    if (dstCap === 0) {
      notes.push(`${devLabel(to)} has no ${conn.toPortType} In`);
      status = 'error';
    } else if (conn.toPortNum > dstCap) {
      notes.push(`${devLabel(to)}: port ${conn.toPortNum} exceeds ${conn.toPortType} In capacity (${dstCap})`);
      status = 'error';
    }

    // Port conflict: same device+type+num used in another connection
    const conflictsOut = plan.connections.filter(c =>
      c.id !== conn.id &&
      c.fromDeviceId === conn.fromDeviceId &&
      c.fromPortType === conn.fromPortType &&
      c.fromPortNum  === conn.fromPortNum
    );
    const conflictsIn = plan.connections.filter(c =>
      c.id !== conn.id &&
      c.toDeviceId === conn.toDeviceId &&
      c.toPortType === conn.toPortType &&
      c.toPortNum  === conn.toPortNum
    );
    if (conflictsOut.length > 0) {
      notes.push(`${conn.fromPortType} Out ${conn.fromPortNum} on ${devLabel(from)} is already used by another connection`);
      status = 'error';
    }
    if (conflictsIn.length > 0) {
      notes.push(`${conn.toPortType} In ${conn.toPortNum} on ${devLabel(to)} is already used by another connection`);
      status = 'error';
    }

    if (notes.length === 0) notes.push('Valid');
    return { status, notes };
  }

  // ── Main render ──────────────────────────────────────────────
  function render() {
    const enriched = plan.connections.map(c => ({ ...c, ...validateConn(c) }));

    renderStats(enriched);
    renderDiagram(enriched);
    renderPathChecker();
    renderConnTable(enriched);

    ['stats-section','diagram-section','path-section','conn-section'].forEach(id =>
      document.getElementById(id).classList.remove('hidden')
    );
  }

  // ── Stats ────────────────────────────────────────────────────
  function renderStats(enriched) {
    const errors   = enriched.filter(c => c.status === 'error' || c.status === 'incomplete').length;
    const warnings = enriched.filter(c => c.status === 'warn').length;
    document.getElementById('stats-cards').innerHTML = `
      <div class="stat-card"><div class="num">${plan.devices.length}</div><div class="label">Devices</div></div>
      <div class="stat-card"><div class="num">${enriched.length}</div><div class="label">Connections</div></div>
      <div class="stat-card"><div class="num">${plan.areas.length}</div><div class="label">Areas</div></div>
      <div class="stat-card ${errors > 0 ? 'errors' : ''}"><div class="num">${errors}</div><div class="label">Errors</div></div>
      <div class="stat-card ${warnings > 0 ? 'warnings' : ''}"><div class="num">${warnings}</div><div class="label">Warnings</div></div>
    `;
  }

  // ── Diagram ──────────────────────────────────────────────────
  function renderDiagram(enriched) {
    const NODE_W = 172, LINE_H = 16, PAD = 24, AREA_PAD = 14, AREA_TOP = 26, COL_GAP = 40, DEV_GAP = 14;

    function nodeH(dev) {
      const n = [dev.hdmiOut, dev.hdmiIn, dev.dpOut, dev.dpIn].filter(v => v > 0).length;
      return Math.max(70, 52 + n * LINE_H);
    }

    // Group by area; unassigned last
    const colData = [];
    plan.areas.forEach(area => {
      const devs = plan.devices.filter(d => d.areaId === area.id);
      if (devs.length > 0) colData.push({ area, devs });
    });
    const noArea = plan.devices.filter(d => d.areaId == null);
    if (noArea.length > 0) colData.push({ area: null, devs: noArea });

    if (colData.length === 0) {
      document.getElementById('diagram-container').innerHTML = '<div class="placeholder">No devices.</div>';
      return;
    }

    // Compute positions
    const nodePos = {};
    let cx = PAD;
    colData.forEach(col => {
      let cy = PAD + AREA_TOP + AREA_PAD;
      col.devs.forEach(dev => {
        const h = nodeH(dev);
        nodePos[dev.id] = { x: cx + AREA_PAD, y: cy, w: NODE_W, h };
        cy += h + DEV_GAP;
      });
      col._x = cx;
      col._w = NODE_W + AREA_PAD * 2;
      col._h = cy - PAD - DEV_GAP + AREA_PAD;
      cx += col._w + COL_GAP;
    });

    const svgW = Math.max(cx - COL_GAP + PAD, 400);
    const svgH = Math.max(...colData.map(c => PAD + c._h)) + PAD;

    const EDGE_COL = { ok: '#2e7d32', warn: '#e65100', error: '#c62828', incomplete: '#bdbdbd' };
    const NODE_STYLE = {
      Source:  { fill: '#e3f2fd', stroke: '#90caf9' },
      Switch:  { fill: '#f3e5f5', stroke: '#ce93d8' },
      Display: { fill: '#e8f5e9', stroke: '#a5d6a7' },
    };
    function devCat(dev) {
      if (['Console','Desktop','Laptop'].includes(dev.type)) return 'Source';
      if (['Display Switch','KVM Switch'].includes(dev.type)) return 'Switch';
      if (dev.type === 'Monitor') return 'Display';
      return 'Source';
    }

    let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${svgW}" height="${svgH}" style="display:block">`;

    // Arrow markers
    Object.entries(EDGE_COL).forEach(([key, color]) => {
      svg += `<defs><marker id="arr-${key}" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" fill="${color}"/></marker></defs>`;
    });

    // Area boxes
    colData.forEach(col => {
      if (col.area) {
        const {r,g,b} = hexToRgb(col.area.color);
        svg += `<rect x="${col._x}" y="${PAD}" width="${col._w}" height="${col._h}"
          rx="8" fill="rgba(${r},${g},${b},0.1)" stroke="${col.area.color}" stroke-width="2" stroke-dasharray="6 3"/>`;
        svg += `<text x="${col._x+10}" y="${PAD+17}" font-size="11" font-weight="bold" fill="${col.area.color}">${esc(col.area.name)}</text>`;
      } else {
        svg += `<rect x="${col._x}" y="${PAD}" width="${col._w}" height="${col._h}"
          rx="8" fill="rgba(0,0,0,0.02)" stroke="#bbb" stroke-width="1.5" stroke-dasharray="4 3"/>`;
        svg += `<text x="${col._x+10}" y="${PAD+17}" font-size="11" fill="#aaa">No area</text>`;
      }
    });

    // Edges (drawn before nodes so nodes sit on top)
    enriched.forEach(conn => {
      if (conn.fromDeviceId == null || conn.toDeviceId == null) return;
      const src = nodePos[conn.fromDeviceId];
      const tgt = nodePos[conn.toDeviceId];
      if (!src || !tgt) return;

      const color = EDGE_COL[conn.status] || '#999';
      const srcCx = src.x + src.w / 2;
      const tgtCx = tgt.x + tgt.w / 2;
      const dx = tgtCx - srcCx;

      let x1, y1, x2, y2, pathD;
      if (dx > 20) {
        x1 = src.x + src.w; y1 = src.y + src.h / 2;
        x2 = tgt.x;         y2 = tgt.y + tgt.h / 2;
        pathD = `M${x1},${y1} L${x2},${y2}`;
      } else if (dx < -20) {
        x1 = src.x;           y1 = src.y + src.h / 2;
        x2 = tgt.x + tgt.w;  y2 = tgt.y + tgt.h / 2;
        pathD = `M${x1},${y1} L${x2},${y2}`;
      } else {
        x1 = src.x + src.w; y1 = src.y + src.h / 2;
        x2 = tgt.x + tgt.w; y2 = tgt.y + tgt.h / 2;
        pathD = `M${x1},${y1} C${x1+40},${y1} ${x1+40},${y2} ${x2},${y2}`;
      }

      svg += `<path d="${pathD}" stroke="${color}" stroke-width="2" fill="none" marker-end="url(#arr-${conn.status})"/>`;

      // Port label
      const lx = (x1 + x2) / 2;
      const ly = (y1 + y2) / 2 - 6;
      const label = `${conn.fromPortType}${conn.fromPortNum}→${conn.toPortType}${conn.toPortNum}`;
      const lw = label.length * 5.8 + 8;
      svg += `<rect x="${lx - lw/2}" y="${ly - 11}" width="${lw}" height="14" rx="2" fill="white"/>`;
      svg += `<text x="${lx}" y="${ly}" font-size="10" fill="${color}" text-anchor="middle">${esc(label)}</text>`;
    });

    // Nodes
    plan.devices.forEach(dev => {
      const pos = nodePos[dev.id];
      if (!pos) return;
      const { fill, stroke } = NODE_STYLE[devCat(dev)];
      const { x, y, w, h } = pos;
      const name = devLabel(dev);
      const truncName = name.length > 19 ? name.slice(0, 18) + '…' : name;

      svg += `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="6" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>`;
      svg += `<text x="${x+10}" y="${y+22}" font-size="13" font-weight="bold" fill="#222">${esc(truncName)}</text>`;
      svg += `<text x="${x+10}" y="${y+37}" font-size="11" fill="#666">${esc(dev.type)}</text>`;

      let py = 52;
      if (dev.hdmiOut > 0) { svg += `<text x="${x+10}" y="${y+py}" font-size="10" fill="#555">HDMI Out: ${dev.hdmiOut}</text>`; py += LINE_H; }
      if (dev.hdmiIn  > 0) { svg += `<text x="${x+10}" y="${y+py}" font-size="10" fill="#555">HDMI In: ${dev.hdmiIn}</text>`;  py += LINE_H; }
      if (dev.dpOut   > 0) { svg += `<text x="${x+10}" y="${y+py}" font-size="10" fill="#555">DP Out: ${dev.dpOut}</text>`;    py += LINE_H; }
      if (dev.dpIn    > 0) { svg += `<text x="${x+10}" y="${y+py}" font-size="10" fill="#555">DP In: ${dev.dpIn}</text>`;      py += LINE_H; }
    });

    svg += '</svg>';
    document.getElementById('diagram-container').innerHTML = svg;
  }

  // ── Path Checker ─────────────────────────────────────────────
  function devOptLabel(d) {
    const area = areaOf(d);
    const prefix = area ? `[${(area.name.trim() || '?').charAt(0)}] ` : '';
    return prefix + devLabel(d);
  }

  function renderPathChecker() {
    // From: devices with at least one Out port
    const fromDevs = plan.devices.filter(d => d.hdmiOut > 0 || d.dpOut > 0);
    // To: devices with at least one In port
    const toDevs   = plan.devices.filter(d => d.hdmiIn  > 0 || d.dpIn  > 0);

    document.getElementById('path-from').innerHTML = fromDevs.map(d =>
      `<option value="${d.id}">${esc(devOptLabel(d))}</option>`
    ).join('');
    document.getElementById('path-to').innerHTML = toDevs.map(d =>
      `<option value="${d.id}">${esc(devOptLabel(d))}</option>`
    ).join('');

    // Default: select different devices if possible
    if (toDevs.length > 1) document.getElementById('path-to').selectedIndex = 1;

    document.getElementById('path-result').classList.add('hidden');
  }

  // BFS over the connection graph (edges treated as bidirectional).
  // Returns an array of { conn, forward } legs, or null if no path found within maxHops.
  function findPath(fromId, toId, maxHops) {
    // Build adjacency list: deviceId → [{neighborId, conn, forward}]
    const adj = {};
    plan.devices.forEach(d => { adj[d.id] = []; });
    plan.connections.forEach(conn => {
      if (conn.fromDeviceId == null || conn.toDeviceId == null) return;
      (adj[conn.fromDeviceId] = adj[conn.fromDeviceId] || []).push({ neighborId: conn.toDeviceId,   conn, forward: true  });
      (adj[conn.toDeviceId]   = adj[conn.toDeviceId]   || []).push({ neighborId: conn.fromDeviceId, conn, forward: false });
    });

    // BFS — each queue entry: { nodeId, legs[] }
    const queue = [{ nodeId: fromId, legs: [] }];
    const visited = new Set([fromId]);

    while (queue.length > 0) {
      const { nodeId, legs } = queue.shift();
      if (legs.length >= maxHops) continue;
      for (const edge of (adj[nodeId] || [])) {
        if (visited.has(edge.neighborId)) continue;
        const newLegs = [...legs, { conn: edge.conn, forward: edge.forward }];
        if (edge.neighborId === toId) return newLegs;
        visited.add(edge.neighborId);
        queue.push({ nodeId: edge.neighborId, legs: newLegs });
      }
    }
    return null;
  }

  function worstStatus(statuses) {
    if (statuses.includes('error') || statuses.includes('incomplete')) return 'error';
    if (statuses.includes('warn')) return 'warn';
    return 'ok';
  }

  function checkPath() {
    const fromId = +document.getElementById('path-from').value;
    const toId   = +document.getElementById('path-to').value;
    const resultEl = document.getElementById('path-result');
    resultEl.classList.remove('hidden', 'ok', 'warn', 'error', 'none');

    if (!fromId || !toId) {
      resultEl.className = 'path-result none';
      resultEl.textContent = 'Select a source and destination device.';
      return;
    }
    if (fromId === toId) {
      resultEl.className = 'path-result error';
      resultEl.textContent = 'Source and destination are the same device.';
      return;
    }

    const from = devById(fromId);
    const to   = devById(toId);
    const legs = findPath(fromId, toId, 10);

    if (!legs) {
      resultEl.className = 'path-result none';
      resultEl.textContent = `No connection path found between ${devOptLabel(from)} and ${devOptLabel(to)} (checked up to 10 hops).`;
      return;
    }

    // Reconstruct device sequence
    const nodeIds = [fromId];
    legs.forEach(({ conn, forward }) => {
      nodeIds.push(forward ? conn.toDeviceId : conn.fromDeviceId);
    });

    // Build per-leg display rows
    const legRows = legs.map(({ conn, forward }, i) => {
      const v = validateConn(conn);
      const portStr = forward
        ? `${conn.fromPortType} Out ${conn.fromPortNum} → ${conn.toPortType} In ${conn.toPortNum}`
        : `${conn.toPortType} Out ${conn.toPortNum} → ${conn.fromPortType} In ${conn.fromPortNum}`;
      const srcDev = devById(nodeIds[i]);
      const dstDev = devById(nodeIds[i + 1]);
      return { srcDev, dstDev, portStr, status: v.status, note: v.notes.join(', ') };
    });

    const overall = worstStatus(legRows.map(r => r.status));
    const STATUS_ICON = { ok: '✅', warn: '⚠️', error: '❌', incomplete: '○' };

    const pathHeader = nodeIds.map(id => `<strong>${esc(devOptLabel(devById(id)))}</strong>`).join(' → ');
    const legLines = legRows.map(r =>
      `${STATUS_ICON[r.status]} ${esc(devOptLabel(r.srcDev))} ──[${esc(r.portStr)}]──▶ ${esc(devOptLabel(r.dstDev))}<br><span style="margin-left:1.5em;font-size:0.85rem;opacity:0.85">${esc(r.note)}</span>`
    ).join('<br>');

    resultEl.className = `path-result ${overall}`;
    resultEl.innerHTML = `${pathHeader}<br><br>${legLines}`;
  }

  // ── Connections table ────────────────────────────────────────
  function renderConnTable(enriched) {
    const STATUS = {
      ok:         { cls: 's-ok',  icon: '✅' },
      warn:       { cls: 's-warn',icon: '⚠️' },
      error:      { cls: 's-err', icon: '❌' },
      incomplete: { cls: 's-inc', icon: '○' },
    };

    function deviceCell(deviceId) {
      const dev = devById(deviceId);
      if (!dev) return '<em class="note">—</em>';
      const area = areaOf(dev);
      let style = '';
      if (area) {
        const {r,g,b} = hexToRgb(area.color);
        style = `background:rgba(${r},${g},${b},0.18);border-left:3px solid ${area.color};padding-left:6px;border-radius:3px;`;
      }
      const areaTag = area ? ` <small style="color:#888">(${esc(area.name)})</small>` : '';
      return `<span style="${style}">${esc(devLabel(dev))}</span>${areaTag}`;
    }

    const tbody = document.getElementById('conn-body');
    tbody.innerHTML = enriched.map(conn => {
      const { cls, icon } = STATUS[conn.status] || STATUS.incomplete;
      return `<tr>
        <td class="${cls}" style="text-align:center">${icon}</td>
        <td>${deviceCell(conn.fromDeviceId)}</td>
        <td>${conn.fromPortType} Out ${conn.fromPortNum}</td>
        <td style="text-align:center;color:#888">→</td>
        <td>${deviceCell(conn.toDeviceId)}</td>
        <td>${conn.toPortType} In ${conn.toPortNum}</td>
        <td class="note">${conn.notes.map(n => esc(n)).join('; ')}</td>
      </tr>`;
    }).join('');
  }

  // ── Auto-load from planner localStorage, else sample.json ──
  (function autoLoadFromStorage() {
    const raw = localStorage.getItem('homemediaplan');
    if (raw) {
      try {
        JSON.parse(raw); // validate before touching the DOM
        document.getElementById('json-input').value = raw;
        loadJson();
        document.getElementById('json-input').value = '';
        return; // loaded from localStorage — done
      } catch (e) { /* invalid JSON — fall through to sample.json */ }
    }
    // No saved plan (or corrupt) — load sample.json as demo
    fetch('sample.json')
      .then(r => r.text())
      .then(text => {
        document.getElementById('json-input').value = text;
        loadJson();
        document.getElementById('json-input').value = '';
      })
      .catch(() => {}); // silent if sample.json not found (e.g. file:// in some browsers)
  })();
</script>
</body>
</html>
